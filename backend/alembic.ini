[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Per-module migration branches. Listed statically so CLI commands
# (`alembic heads`, `alembic history`, `alembic upgrade`) resolve the
# full graph before ``env.py`` loads. ``env.py`` still merges in any
# additional branches discovered at runtime (e.g. community modules
# installed from PyPI) via ``discover_version_locations``.
version_locations = alembic/versions:app/modules/patients/migrations/versions:app/modules/patients_clinical/migrations/versions:app/modules/agenda/migrations/versions:app/modules/patient_timeline/migrations/versions:app/modules/catalog/migrations/versions:app/modules/odontogram/migrations/versions:app/modules/treatment_plan/migrations/versions:app/modules/budget/migrations/versions:app/modules/billing/migrations/versions:app/modules/media/migrations/versions:app/modules/notifications/migrations/versions:app/modules/payments/migrations/versions:app/modules/schedules/migrations/versions:app/modules/verifactu/migrations/versions:app/modules/clinical_notes/migrations/versions:app/modules/recalls/migrations/versions:app/modules/migration_import/migrations/versions:app/modules/periodontogram/migrations/versions:app/modules/copilot/migrations/versions

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
