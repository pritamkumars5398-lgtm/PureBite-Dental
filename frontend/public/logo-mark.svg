           C 17.5 33 17.5 37 19.5 38.5
           C 20.5 39.2 21.5 36.2 22 32.5
           C 22.5 28.5 23.3 27 24.5 27
           C 25.7 27 26.5 28.5 27 32.5
           C 27.5 36.2 28.5 39.2 29.5 38.5
           C 31.5 37 31.5 33 32.5 29.5
           C 33.5 26 35 23.5 35 20.5
           C 35 17 33.5 14.8 31.5 13.8
