           C 15 31 15 35 17 36.5
           C 18 37.2 19 34 19.5 30
           C 20 26.5 20.8 25 22 25
           C 23.2 25 24 26.5 24.5 30
           C 25 34 26 37.2 27 36.5
           C 29 35 29 31 30 27.5
           C 31 24 32.5 21.5 32.5 18.5
           C 32.5 15 31 12.5 29 11.2
           C 27 10.2 24 8 24 8 Z"
        fill="url(#iconGradient)"
        stroke="#0D9488"
        stroke-width="1.5"
        stroke-linejoin="round"
        stroke-linecap="round"/>
  
  <!-- Highlight -->
  <ellipse cx="21" cy="16" rx="1.8" ry="2.2" fill="#F0F9FF" opacity="0.7"/>
  
