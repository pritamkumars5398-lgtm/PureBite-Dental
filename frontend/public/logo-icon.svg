<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" role="img" aria-label="Nº 1 Dental Studio">
  <!-- Soft warm background -->
  <rect width="48" height="48" rx="12" fill="#FAF6F0"/>
  <rect width="46" height="46" x="1" y="1" rx="11" fill="none" stroke="#B39D82" stroke-width="1" stroke-opacity="0.2"/>
  
  <!-- Nº 1 Serif Logo -->
  <g transform="translate(4, 8)">
    <text x="0" y="25" font-family="'Georgia', 'Times New Roman', serif" font-size="24" font-weight="normal" fill="#2C2A29">N</text>
    <text x="18" y="13" font-family="'Georgia', 'Times New Roman', serif" font-size="10" font-weight="normal" fill="#2C2A29">o</text>
    <line x1="18" y1="16" x2="24" y2="16" stroke="#2C2A29" stroke-width="1"/>
    <text x="24" y="25" font-family="'Georgia', 'Times New Roman', serif" font-size="24" font-weight="normal" fill="#B39D82">1</text>
  </g>
</svg>
