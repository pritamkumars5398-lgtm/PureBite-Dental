<svg xmlns="http://www.w3.org/2000/svg" width="280" height="64" viewBox="0 0 280 64" fill="none" role="img" aria-label="Nº 1 Dental Studio">
  <!-- Icon part (left aligned) -->
  <g transform="translate(8, 8)">
    <rect width="48" height="48" rx="12" fill="#FAF6F0"/>
    <rect width="46" height="46" x="1" y="1" rx="11" fill="none" stroke="#B39D82" stroke-width="1" stroke-opacity="0.2"/>
    
    <!-- Nº 1 Serif Logo -->
    <g transform="translate(4, 8)">
      <text x="0" y="25" font-family="'Georgia', 'Times New Roman', serif" font-size="24" font-weight="normal" fill="#2C2A29">N</text>
      <text x="18" y="13" font-family="'Georgia', 'Times New Roman', serif" font-size="10" font-weight="normal" fill="#2C2A29">o</text>
      <line x1="18" y1="16" x2="24" y2="16" stroke="#2C2A29" stroke-width="1"/>
      <text x="24" y="25" font-family="'Georgia', 'Times New Roman', serif" font-size="24" font-weight="normal" fill="#B39D82">1</text>
    </g>
  </g>
  
  <!-- Text part (right aligned) -->
  <g transform="translate(72, 10)">
    <!-- Nº 1 -->
    <g transform="translate(0, 0)">
      <text x="0" y="20" font-family="'Georgia', 'Times New Roman', serif" font-size="22" font-weight="normal" fill="#2C2A29">N</text>
      <text x="16" y="10" font-family="'Georgia', 'Times New Roman', serif" font-size="10" font-weight="normal" fill="#2C2A29">o</text>
      <line x1="16" y1="12" x2="22" y2="12" stroke="#2C2A29" stroke-width="0.8"/>
      <text x="22" y="20" font-family="'Georgia', 'Times New Roman', serif" font-size="22" font-weight="normal" fill="#B39D82">1</text>
    </g>
    
    <!-- DENTAL STUDIO -->
    <text x="0" y="34" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600" fill="#2C2A29" letter-spacing="4">DENTAL STUDIO</text>
    
    <!-- Accent Line -->
    <line x1="0" y1="42" x2="108" y2="42" stroke="#B39D82" stroke-width="1"/>
  </g>
</svg>
